<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Финансы | Планировщик</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/finance.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div data-include="/static/includes/header.html"></div>
    <div class="container">
        <h1>Финансы</h1>

        <!-- Ключевые метрики -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Доход</div>
                <div class="stat-value" id="totalIncome">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Расход</div>
                <div class="stat-value" id="totalExpense">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Чистая прибыль</div>
                <div class="stat-value" id="netProfit">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Расходы от дохода</div>
                <div class="stat-value" id="expensePercent">0%</div>
            </div>
        </div>

        <!-- Графики -->
        <div class="charts-row">
            <div class="chart-container">
                <canvas id="balanceChart" width="400" height="300"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="activePassiveChart" width="400" height="300"></canvas>
            </div>
        </div>

        <!-- Управление периодом -->
        <div class="period-controls">
            <button data-period="week">Неделя</button>
            <button data-period="month">Месяц</button>
            <button data-period="year">Год</button>
        </div>

        <!-- Таблица операций -->
        <div class="section">
            <h2>Операции</h2>
            <div class="toolbar">
                <button id="addTransactionBtn">➕ Добавить операцию</button>
                <button id="manageCategoriesBtn">📂 Управлять категориями</button>
            </div>
            <div class="filters">
                <label>Дата с: <input type="date" id="filterDateFrom"></label>
                <label>по: <input type="date" id="filterDateTo"></label>
                <label>Категория: <select id="filterCategory"><option value="">Все</option></select></label>
                <label>Тип: <select id="filterType"><option value="">Все</option><option value="income">Доход</option><option value="expense">Расход</option></select></label>
                <button id="applyFilters">Применить</button>
            </div>
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Категория</th>
                        <th>Сумма</th>
                        <th>Описание</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно для операции -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Добавить операцию</h2>
            <form id="transactionForm">
                <input type="hidden" id="transactionId">
                <div class="form-group">
                    <label for="date">Дата</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" required></select>
                </div>
                <div class="form-group">
                    <label for="amount">Сумма</label>
                    <input type="number" step="0.01" id="amount" required>
                </div>
                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" rows="2"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit">Сохранить</button>
                    <button type="button" id="cancelBtn">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно для категорий (простой CRUD) -->
    <div id="categoriesModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Управление категориями</h2>
            <div class="toolbar">
                <button id="addCategoryBtn">➕ Добавить категорию</button>
            </div>
            <table id="categoriesTable">
                <thead>
                    <tr><th>Название</th><th>Тип</th><th>Активный доход</th><th>Цвет</th><th>Действия</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно для редактирования категории -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Редактировать категорию</h2>
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label for="catName">Название</label>
                    <input type="text" id="catName" required>
                </div>
                <div class="form-group">
                    <label for="catType">Тип</label>
                    <select id="catType" required>
                        <option value="income">Доход</option>
                        <option value="expense">Расход</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="catActive">Активный доход?</label>
                    <input type="checkbox" id="catActive">
                </div>
                <div class="form-group">
                    <label for="catColor">Цвет (hex)</label>
                    <input type="color" id="catColor">
                </div>
                <div class="form-actions">
                    <button type="submit">Сохранить</button>
                    <button type="button" class="closeModalBtn">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/finance.js"></script>
    <script src="/static/include-loader.js" data-scripts=""></script>
    <div data-include="/static/includes/footer.html"></div>
</body>
</html>
